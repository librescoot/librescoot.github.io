# Documentation versions surfaced by the version switcher in the docs nav.
#
# All versions live on main now: docs/<minor>/ for stable snapshots and
# docs/dev/ for the nightly working tree. The canonical site is built once
# from main; each version is a sibling folder.
#
# Current version is detected at render time by matching `page.url` against
# the entries below (`page.url contains v.path_prefix`).
#
# Labels and descriptions live in _data/i18n.yml under `versions:` — set
# `version:` here, and the switcher renders it as
# "v<version>.x (<stable_suffix>)". For dev, the chip text comes from i18n
# (`dev_label` + `dev_suffix`).
#
# When promoting a new stable minor (e.g. 1.1):
#   1. Run scripts/release-new-minor.sh (copies docs/dev/ into docs/1.1/).
#   2. Add the new entry above the previous one so the switcher opens to it
#      by default. Drop `is_stable: true` from the previous entry.
#   3. Bump site.docs_path_prefix in _config.yml to "/docs/1.1".
#   4. Old minors stay listed here as long as their files exist.
#
# The /docs/stable/ alias is provided by redirect_from entries on each page
# of the current stable minor — it always points at whichever minor is the
# is_stable: true one.

- version: "1.0"
  channel: stable
  baseurl: ""
  path_prefix: "/docs/1.0"
  is_stable: true

- channel: dev
  baseurl: ""
  path_prefix: "/docs/dev"
  is_dev: true
