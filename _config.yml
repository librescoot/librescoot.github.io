title: Librescoot
description: Open-source firmware for the unu Scooter Pro
url: https://librescoot.org
baseurl: ""

# Current stable docs path. Top-nav and landing-page docs links use this so
# clicks resolve directly to the right minor (no redirect bounce through
# /docs/stable/). Bump on each minor release.
docs_path_prefix: "/docs/1.0"

plugins:
  - jekyll-polyglot
  - jekyll-redirect-from

languages: ["de", "en"]
default_lang: "de"
exclude_from_localization: ["images", "fonts", "js", "style.css", ".github", "CNAME"]
parallel_localization: true
lang_from_path: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .ruby-lsp/
  - .playwright-mcp/
  - .claude/
  - vendor/
