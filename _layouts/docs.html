<!DOCTYPE html>
<html lang="{{ site.active_lang | default: site.default_lang | default: 'en' }}">
<head>
    {% include head.html %}
</head>
<body>
    {% include nav.html %}

    <main class="docs-main">
        <div class="container">
            {{ content }}
        </div>
    </main>

    {% include footer.html %}

    <script>
        // Heading anchor links
        (function() {
            var slugify = function(text) {
                return text.toLowerCase()
                    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
                    .replace(/&/g, ' und ')
                    .replace(/[^\p{L}\p{N}\s-]/gu, '')
                    .trim()
                    .replace(/\s+/g, '-');
            };
            var used = {};
            var headings = document.querySelectorAll('.docs-main h1, .docs-main h2, .docs-main h3, .docs-main h4');
            headings.forEach(function(h) {
                var id = h.id || slugify(h.textContent);
                if (!id) return;
                var base = id, n = 1;
                while (used[id]) { id = base + '-' + (++n); }
                used[id] = true;
                h.id = id;
                var link = document.createElement('a');
                link.href = '#' + id;
                link.className = 'heading-anchor';
                link.setAttribute('aria-label', 'Link to this section');
                link.innerHTML = '<i data-lucide="link"></i>';
                h.appendChild(link);
            });
        })();

        lucide.createIcons();

        // Theme toggle
        {% include theme-toggle.js %}

        // Mobile navigation toggle
        var nav = document.querySelector('.nav-links');
        var navToggle = document.createElement('button');
        navToggle.className = 'nav-toggle';
        navToggle.innerHTML = '\u2630';
        navToggle.setAttribute('aria-label', 'Toggle navigation');
        document.querySelector('.nav-container').appendChild(navToggle);

        navToggle.addEventListener('click', function() {
            nav.classList.toggle('nav-open');
        });
    </script>
</body>
</html>
