<!DOCTYPE html>
<html lang="{{ site.active_lang | default: site.default_lang | default: 'en' }}">
<head>
    {% include head.html %}
    <script src="/js/marked.min.js"></script>
</head>
<body>
    {% include nav.html %}

    <main class="docs-main">
        <div class="container">
            {{ content }}
        </div>
    </main>

    {% include footer.html %}

    <script>
        lucide.createIcons();

        // Theme toggle
        {% include theme-toggle.js %}

        // Mobile navigation toggle
        var nav = document.querySelector('.nav-links');
        var navToggle = document.createElement('button');
        navToggle.className = 'nav-toggle';
        navToggle.innerHTML = '\u2630';
        navToggle.setAttribute('aria-label', 'Toggle navigation');
        document.querySelector('.nav-container').appendChild(navToggle);
        navToggle.addEventListener('click', function() {
            nav.classList.toggle('nav-open');
        });

        {% assign t = site.data.i18n[site.active_lang] %}
        const i18n = {
            noReleases: {{ t.changelog.no_releases | jsonify }},
            noNotes: {{ t.changelog.no_notes | jsonify }},
            errorPrefix: {{ t.changelog.error_prefix | jsonify }},
            errorLink: {{ t.changelog.error_link | jsonify }}
        };

        async function loadReleases() {
            const container = document.getElementById('releases');

            try {
                const response = await fetch('https://api.github.com/repos/librescoot/librescoot/releases?per_page=20');

                if (!response.ok) {
                    throw new Error('Failed to fetch releases');
                }

                const releases = await response.json();

                if (releases.length === 0) {
                    container.innerHTML = `<p>${i18n.noReleases}</p>`;
                    return;
                }

                {% if site.active_lang == "de" %}
                const dateFormatter = new Intl.DateTimeFormat('sv-SE', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', hourCycle: 'h23'
                });
                {% else %}
                const dateFormatter = new Intl.DateTimeFormat('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });
                {% endif %}

                container.innerHTML = releases.map(release => {
                    const date = dateFormatter.format(new Date(release.published_at));

                    const isNightly = release.tag_name.includes('nightly');
                    const channel = isNightly ? 'nightly' : (release.prerelease ? 'testing' : 'stable');
                    const channelLabel = isNightly ? 'Nightly' : (release.prerelease ? 'Testing' : 'Stable');

                    const body = release.body
                        ? marked.parse(release.body)
                        : `<p>${i18n.noNotes}</p>`;

                    return `
                        <article class="release">
                            <header class="release-header">
                                <h2>
                                    <a href="${release.html_url}">${release.name || release.tag_name}</a>
                                    <span class="channel-badge ${channel}">${channelLabel}</span>
                                </h2>
                                <time datetime="${release.published_at}">${date}</time>
                            </header>
                            <div class="release-body">
                                ${body}
                            </div>
                        </article>
                    `;
                }).join('');

            } catch (error) {
                container.innerHTML = `
                    <p>${i18n.errorPrefix} <a href="https://github.com/librescoot/librescoot/releases">${i18n.errorLink}</a>.</p>
                `;
            }
        }

        loadReleases();
    </script>
</body>
</html>
