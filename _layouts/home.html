<!DOCTYPE html>
<html lang="{{ site.active_lang | default: site.default_lang | default: 'en' }}">
<head>
    {% include head.html %}
    <script src="/js/lottie.min.js"></script>
</head>
<body>
    {{ content }}

    {% include footer.html %}

    <script>
        lucide.createIcons();

        // Theme toggle
        {% include theme-toggle.js %}

        // Boot animation
        var lowerDot = document.getElementById('dbc-dot-lower');
        var bootLogo = document.getElementById('boot-logo');
        var bootAnimEl = document.getElementById('boot-animation');

        var anim = lottie.loadAnimation({
            container: bootAnimEl,
            renderer: 'svg',
            loop: false,
            autoplay: false,
            path: '/images/boot-animation.json'
        });

        setTimeout(function() {
            lowerDot.classList.add('dbc-dot-green');
        }, 500);

        setTimeout(function() {
            lowerDot.classList.remove('dbc-dot-green');
            bootLogo.style.opacity = '1';
        }, 1250);

        setTimeout(function() {
            bootAnimEl.style.opacity = '1';
            anim.play();
        }, 2750);

        // Screenshot carousel — starts after boot animation
        var carousel = document.getElementById('screenshot-carousel');
        var slides = document.querySelectorAll('.screenshot-slide');
        var currentSlide = 0;

        anim.addEventListener('complete', function() {
            setTimeout(function() {
                bootAnimEl.style.opacity = '0';
                bootLogo.style.opacity = '0';
                carousel.classList.add('active');
                setInterval(function() {
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 4000);
            }, 1500);
        });

        // Mobile navigation toggle
        var nav = document.querySelector('.nav-links');
        var navToggle = document.createElement('button');
        navToggle.className = 'nav-toggle';
        navToggle.innerHTML = '\u2630';
        navToggle.setAttribute('aria-label', 'Toggle navigation');
        document.querySelector('.nav-container').appendChild(navToggle);

        navToggle.addEventListener('click', function() {
            nav.classList.toggle('nav-open');
        });
    </script>
</body>
</html>
