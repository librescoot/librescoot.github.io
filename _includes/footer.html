{% assign t = site.data.i18n[site.active_lang] %}
<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-info">
                <strong>Librescoot</strong>
                <p>{{ t.footer.tagline }}<br>{{ t.footer.disclaimer }}</p>
            </div>
            <div class="footer-links">
                <a href="https://github.com/librescoot">{{ t.footer.github }}</a>
                <a href="https://discord.gg/BmY2P2T9j3">{{ t.footer.discord }}</a>
                <a href="https://github.com/librescoot/librescoot/releases">{{ t.footer.releases }}</a>
                <a href="/docs/">{{ t.footer.documentation }}</a>
                <a href="/changelog.html">{{ t.footer.changelog }}</a>
                <a href="https://reference.librescoot.org">{{ t.footer.reference }}</a>
            </div>
            <div class="footer-license">
                <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a> / <a href="https://www.gnu.org/licenses/agpl-3.0.en.html">AGPL 3.0</a>
            </div>
        </div>
    </div>
</footer>
