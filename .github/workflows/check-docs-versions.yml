name: Check docs versions

# Fires the same check as the deploy workflow, but on a daily schedule so a
# new firmware release (which lands on librescoot/librescoot, not here)
# triggers a failure here within 24h instead of waiting for the next docs push.
#
# A failed scheduled run shows up in the Actions UI and emails the repo's
# notification recipients. Fix by running scripts/release-new-minor.sh <minor>
# to seed the missing docs folder, or by re-running the workflow once the
# release was a mistake.

on:
  schedule:
    - cron: '17 6 * * *'  # 06:17 UTC daily — off-the-hour to avoid the cron stampede
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check docs versions cover released firmware
        run: .github/check-docs-versions.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
