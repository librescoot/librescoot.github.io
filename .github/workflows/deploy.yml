name: Deploy to GitHub Pages

# Single-branch publish. All doc versions live as folders on main:
#   docs/<minor>/  — frozen stable snapshots (1.0, 1.1, …)
#   docs/dev/      — nightly working tree
# /docs/stable/ is provided as redirects from the current is_stable minor.

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [releases-changed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check docs versions cover released firmware
        run: .github/check-docs-versions.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release data
        run: .github/fetch-release-data.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - uses: actions/configure-pages@v5

      - name: Build site
        run: bundle exec jekyll build --destination "$GITHUB_WORKSPACE/_site"
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
